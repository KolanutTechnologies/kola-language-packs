<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="Kola language packs banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- Accent bar -->
  <rect x="88" y="64" width="8" height="192" rx="4" fill="url(#accent)"/>

  <!-- Title -->
  <g filter="url(#softShadow)">
    <text x="120" y="132" fill="#ffffff" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="46" font-weight="800">
      @kolanut/language-packs
    </text>
    <text x="120" y="178" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="20" font-weight="500">
      Spec-backed keyword coverage + African language packs for multilingual programming tools
    </text>
  </g>

  <!-- Scoreboard chips (visual hint, not badges) -->
  <g transform="translate(120 214)">
    <g>
      <rect x="0" y="0" width="180" height="44" rx="12" fill="#0f172a" stroke="#1f2a44"/>
      <text x="18" y="28" fill="#e2e8f0" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" font-weight="700">25 packs</text>
    </g>
    <g transform="translate(196 0)">
      <rect x="0" y="0" width="180" height="44" rx="12" fill="#0f172a" stroke="#1f2a44"/>
      <text x="18" y="28" fill="#e2e8f0" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" font-weight="700">5 targets</text>
    </g>
    <g transform="translate(392 0)">
      <rect x="0" y="0" width="180" height="44" rx="12" fill="#0f172a" stroke="#1f2a44"/>
      <text x="18" y="28" fill="#e2e8f0" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" font-weight="700">99 tokens</text>
    </g>
    <g transform="translate(588 0)">
      <rect x="0" y="0" width="180" height="44" rx="12" fill="#0f172a" stroke="#1f2a44"/>
      <text x="18" y="28" fill="#86efac" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="16" font-weight="800">0 gaps</text>
    </g>
  </g>
</svg>

