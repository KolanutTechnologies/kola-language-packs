<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="Architecture: how language packs fit together">
  <defs>
    <style>
      .bg { fill: #0b1220; }
      .card { fill: #0f172a; stroke: #1f2a44; stroke-width: 2; }
      .title { fill: #ffffff; font: 700 20px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; }
      .body { fill: #cbd5e1; font: 500 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; }
      .chip { fill: #111a2e; stroke: #1f2a44; stroke-width: 2; }
      .chipText { fill: #e2e8f0; font: 700 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; }
      .line { stroke: #334155; stroke-width: 3; fill: none; }
      .accent { stroke: #22c55e; stroke-width: 4; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="520"/>

  <text x="72" y="72" class="title" font-size="28">How the packs fit together</text>
  <text x="72" y="104" class="body">A shared registry (concepts) + spec keywords (targets) + human language packs  validated so tools can build with confidence.</text>

  <!-- Left column -->
  <rect class="card" x="72" y="150" width="360" height="130" rx="16"/>
  <text x="100" y="192" class="title">Logical token registry</text>
  <text x="100" y="220" class="body">99 concepts (IF, FOR, CLASS, &)</text>
  <text x="100" y="246" class="body">Shared across all target languages</text>
  <g>
    <rect class="chip" x="100" y="262" width="120" height="32" rx="10"/>
    <text class="chipText" x="116" y="283">logical-tokens</text>
  </g>

  <rect class="card" x="72" y="305" width="360" height="150" rx="16"/>
  <text x="100" y="347" class="title">Official keyword lists</text>
  <text x="100" y="375" class="body">Reserved words from language specs</text>
  <text x="100" y="401" class="body">JavaScript / Python / TS / Go / Rust</text>
  <g>
    <rect class="chip" x="100" y="417" width="160" height="32" rx="10"/>
    <text class="chipText" x="116" y="438">official keywords</text>
  </g>

  <!-- Middle -->
  <rect class="card" x="480" y="212" width="280" height="180" rx="16"/>
  <text x="508" y="254" class="title">African language packs</text>
  <text x="508" y="282" class="body">25 shipped packs today</text>
  <text x="508" y="308" class="body">Each pack maps all 99 tokens</text>
  <text x="508" y="334" class="body">Aliases cover dialect variants</text>
  <g>
    <rect class="chip" x="508" y="350" width="120" height="32" rx="10"/>
    <text class="chipText" x="524" y="371">packs/*</text>
  </g>

  <!-- Right -->
  <rect class="card" x="808" y="190" width="320" height="224" rx="16"/>
  <text x="836" y="232" class="title">Tools that consume this</text>
  <text x="836" y="260" class="body">IDE / transpiler / linter / learning apps</text>
  <text x="836" y="286" class="body">Load pack ’ flatten keywords ’ compile</text>
  <text x="836" y="312" class="body">Target output: JS / Py / TS / Go / Rust</text>
  <g>
    <rect class="chip" x="836" y="332" width="150" height="32" rx="10"/>
    <text class="chipText" x="852" y="353">npm package</text>
  </g>

  <!-- Arrows -->
  <path class="line" marker-end="url(#arrow)" d="M 432 215 C 460 215, 460 250, 480 250"/>
  <path class="line" marker-end="url(#arrow)" d="M 432 378 C 460 378, 460 330, 480 330"/>

  <path class="line accent" marker-end="url(#arrowAccent)" d="M 760 302 C 788 302, 788 302, 808 302"/>

  <!-- Footer -->
  <text x="72" y="492" class="body">Validation: keyword coverage is checked against specs (0 gaps). Pack scope is controlled via locale/countries/regions metadata.</text>
</svg>

