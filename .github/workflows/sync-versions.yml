name: Sync pack versions

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

jobs:
  sync-pack-versions:
    if: startsWith(github.head_ref, 'release-please--branches--')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: node scripts/sync-pack-versions.mjs

      - name: Commit synced pack versions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packs/
          if git diff --staged --quiet; then
            echo "Pack versions already in sync."
          else
            git commit -m "chore: sync pack versions with package.json"
            git push
          fi
