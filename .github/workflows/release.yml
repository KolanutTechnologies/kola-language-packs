name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      republish_version:
        description: 'Re-publish an existing tag to npm (e.g. 0.3.0). Leave empty for auto catch-up.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.direct.outputs.released }}
      version: ${{ steps.direct.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Prepare release (tag vX.Y.Z, no Release PR)
        id: direct
        run: node scripts/direct-release.mjs

      - name: Commit, tag, and push
        if: steps.direct.outputs.released == 'true'
        env:
          VERSION: ${{ steps.direct.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): publish v${VERSION}"
          git tag "v${VERSION}"
          git push origin main --follow-tags

      - name: Create GitHub Release
        if: steps.direct.outputs.released == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.direct.outputs.version }}
          body_path: release-body.md
          generate_release_notes: false

  resolve-publish:
    runs-on: ubuntu-latest
    needs: release
    if: always() && (github.event_name == 'workflow_dispatch' || needs.release.result != 'skipped')
    outputs:
      publish: ${{ steps.pick.outputs.publish }}
      version: ${{ steps.pick.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Pick npm version to publish
        id: pick
        env:
          RELEASED: ${{ needs.release.outputs.released }}
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
        run: |
          if [ -n "${{ github.event.inputs.republish_version }}" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "version=${{ github.event.inputs.republish_version }}" >> "$GITHUB_OUTPUT"
            echo "Manual republish: v${{ github.event.inputs.republish_version }}"
          elif [ "$RELEASED" = "true" ] && [ -n "$RELEASE_VERSION" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
            echo "Fresh release: v$RELEASE_VERSION"
          else
            node scripts/npm-publish-catchup.mjs
          fi

  publish-npm:
    needs: resolve-publish
    if: needs.resolve-publish.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.resolve-publish.outputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      # Trusted Publisher (OIDC): workflow filename must match npm settings: release.yml
      - name: Ensure npm supports OIDC trusted publishing
        run: npm install -g npm@latest

      - run: npm ci
      - run: npm run sync-versions
      - run: npm publish --provenance --access public
