name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.direct.outputs.released }}
      version: ${{ steps.direct.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Prepare release (tag vX.Y.Z, no Release PR)
        id: direct
        run: node scripts/direct-release.mjs

      - name: Commit, tag, and push
        if: steps.direct.outputs.released == 'true'
        env:
          VERSION: ${{ steps.direct.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): publish v${VERSION}"
          git tag "v${VERSION}"
          git push origin main --follow-tags

      - name: Create GitHub Release
        if: steps.direct.outputs.released == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.direct.outputs.version }}
          body_path: release-body.md
          generate_release_notes: false

  publish-npm:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      # Trusted Publisher (OIDC): no NPM_TOKEN. Workflow filename must match npm settings: release.yml
      - name: Ensure npm supports OIDC trusted publishing
        run: npm install -g npm@latest

      - run: npm ci
      - run: npm run sync-versions
      - run: npm publish --provenance --access public
